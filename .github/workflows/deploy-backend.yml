name: Deploy Backend (CDK)

on:
  push:
    branches: ["staging"]
    paths:
      - "backend/**"
      - "infra/**"
      - "shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-backend-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build layer & cdk deploy
    runs-on: ubuntu-latest

    permissions:
      id-token: write # required for OIDC credential federation
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.16.1
          run_install: false

      - name: Setup Node 20 with pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # ── Shared package ──────────────────────────────────────────────────────
      - name: Build shared package
        run: pnpm --filter @icaf/shared build

      # ── Sharp Lambda layer ──────────────────────────────────────────────────
      - name: Build Sharp Lambda layer (linux-x64-glibc)
        run: pnpm --dir infra layer:build

      # ── Build CDK app ───────────────────────────────────────────────────────
      - name: Build CDK app
        run: pnpm --dir infra build

      # ── AWS credentials (OIDC) ──────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      # ── CDK deploy ───────────────────────────────────────────────────────────
      - name: CDK deploy
        working-directory: infra
        run: pnpm exec cdk deploy InfraStack --require-approval never