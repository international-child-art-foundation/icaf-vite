name: Deploy Backend and API Proxy

on:
  push:
    branches: ["staging", "main"]
    paths:
      - "backend/**"
      - "infra/**"
      - "shared/**"
      - "cloudflare/api-proxy/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-backend-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy AWS backend and Cloudflare proxy
    if: github.ref_name == 'main' || github.ref_name == 'staging'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    env:
      DEPLOY_ENV: ${{ github.ref_name }}
      CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

    permissions:
      id-token: write # required for OIDC credential federation
      contents: read

    steps:
      - name: Validate deployment configuration
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          if [ -z "$AWS_REGION" ]; then
            echo "AWS_REGION must be configured in the $GITHUB_REF_NAME GitHub Environment." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Guard debug flags
        run: node scripts/ensureDebugFlagsDisabled.mjs

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.2
          run_install: false

      - name: Setup Node 22 with pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # ── Shared package ──────────────────────────────────────────────────────
      - name: Build shared package
        run: pnpm --filter @icaf/shared build

      # ── Sharp Lambda layer ──────────────────────────────────────────────────
      - name: Build Sharp Lambda layer (linux-x64-glibc)
        run: pnpm --dir infra layer:build

      # ── Build CDK app ───────────────────────────────────────────────────────
      - name: Build CDK app
        run: pnpm --dir infra build

      - name: Typecheck Worker
        run: pnpm --filter @icaf/cloudflare-api-proxy typecheck

      - name: Test Worker
        run: pnpm --filter @icaf/cloudflare-api-proxy test

      # ── AWS credentials (OIDC) ──────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # ── CDK deploy ───────────────────────────────────────────────────────────
      - name: CDK deploy
        working-directory: infra
        env:
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          EVERY_WEBHOOK_SECRET: ${{ secrets.EVERY_WEBHOOK_SECRET }}
        run: |
          pnpm exec cdk diff --all
          pnpm exec cdk deploy --all --require-approval never --outputs-file cdk-outputs.json

      - name: Export API Gateway origin
        id: cdk-outputs
        working-directory: infra
        shell: bash
        run: |
          TARGET_API_ORIGIN="$(node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const stacks = Object.values(JSON.parse(readFileSync("cdk-outputs.json", "utf8")));
          const origins = stacks
            .map((outputs) => outputs?.ApiGatewayOrigin)
            .filter((value) => typeof value === "string");

          if (origins.length !== 1) {
            throw new Error(`Expected exactly one ApiGatewayOrigin CDK output; found ${origins.length}.`);
          }

          const target = new URL(origins[0]);
          if (
            target.protocol !== "https:" ||
            !target.hostname.includes(".execute-api.") ||
            !target.hostname.endsWith(".amazonaws.com")
          ) {
            throw new Error("ApiGatewayOrigin is not an HTTPS API Gateway URL.");
          }

          process.stdout.write(target.toString().replace(/\/$/, ""));
          NODE
          )"
          echo "target_api_origin=$TARGET_API_ORIGIN" >> "$GITHUB_OUTPUT"
          {
            echo "### AWS backend deployed"
            echo
            echo "Cloudflare will proxy to: \`$TARGET_API_ORIGIN\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Select Worker environment
        id: worker-env
        shell: bash
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "name=production" >> "$GITHUB_OUTPUT"
          else
            echo "name=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare/api-proxy
          command: >-
            deploy --env ${{ steps.worker-env.outputs.name }}
            --var
            "ENVIRONMENT:${{ steps.worker-env.outputs.name }}"
            "TARGET_API_ORIGIN:${{ steps.cdk-outputs.outputs.target_api_origin }}"

      - name: Record deployment summary
        shell: bash
        run: |
          {
            echo "### Cloudflare API proxy deployed"
            echo
            echo "Worker environment: \`${{ steps.worker-env.outputs.name }}\`"
            echo "API target: \`${{ steps.cdk-outputs.outputs.target_api_origin }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
